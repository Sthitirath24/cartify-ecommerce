services:
  # Web Service
  - type: web
    name: cartify-web
    env: python
    plan: starter
    runtime: "python3.11"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT app:app"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cartify-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USE_TLS
        value: true
      - key: UPLOAD_FOLDER
        value: /app/uploads
    autoDeploy: true
    healthCheckPath: /health

  # PostgreSQL Database
  - type: pserv
    name: cartify-db
    plan: starter
    databaseName: cartify
    user: cartify_user
