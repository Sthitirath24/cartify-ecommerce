<!-- Multilingual Chatbot Widget -->
<div id="chatbot-widget" class="chatbot-widget">
    <!-- Header -->
    <div class="chatbot-header">
        <div class="chatbot-title">
            <i class="fas fa-comments"></i>
            <span id="chatbot-title">Chat with Cartify</span>
        </div>
        <div class="chatbot-controls">
            <select id="language-select" class="language-select">
                <option value="en">English</option>
                <option value="hi">हिंदी</option>
                <option value="or">ଓଡ଼ିଆ</option>
                <option value="ta">தமிழ்</option>
                <option value="te">తెలుగు</option>
                <option value="bn">বাংলা</option>
                <option value="mr">मराठी</option>
                <option value="gu">ગુજરાતી</option>
            </select>
            <button id="close-chatbot" class="close-btn"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <!-- Messages Container -->
    <div id="messages-container" class="messages-container">
        <div class="message bot-message">
            <div class="message-content" id="welcome-message">
                Hello! Welcome to Cartify. How can I help you today?
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="chatbot-input-area">
        <input 
            type="text" 
            id="chat-input" 
            class="chat-input" 
            placeholder="Type your message..."
            autocomplete="off"
        >
        <button id="send-btn" class="send-btn">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</div>

<!-- Chatbot Trigger Button (Floating) -->
<button id="chatbot-trigger" class="chatbot-trigger">
    <i class="fas fa-comments"></i>
    <span class="notification-badge">1</span>
</button>

<style>

    position: fixed;
    bottom: 90px;

    background: white;

</style>

<script>
// Multilingual Chatbot JavaScript
class MultilingualChatbot {
    constructor() {
        this.widget = document.getElementById('chatbot-widget');
        this.trigger = document.getElementById('chatbot-trigger');
        this.closeBtn = document.getElementById('close-chatbot');
        this.messagesContainer = document.getElementById('messages-container');
        this.chatInput = document.getElementById('chat-input');
        this.sendBtn = document.getElementById('send-btn');
        this.languageSelect = document.getElementById('language-select');
        
        this.currentLanguage = localStorage.getItem('chatbotLanguage') || 'en';
        this.sessionId = this.generateSessionId();
        
        this.init();
    }
    
    init() {
        // Event listeners
        this.trigger.addEventListener('click', () => this.toggleWidget());
        this.closeBtn.addEventListener('click', () => this.toggleWidget());
        this.sendBtn.addEventListener('click', () => this.sendMessage());
        this.chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') this.sendMessage();
        });
        this.languageSelect.addEventListener('change', (e) => {
            this.currentLanguage = e.target.value;
            localStorage.setItem('chatbotLanguage', this.currentLanguage);
            this.updateLanguage();
        });
        
        // Set initial language
        this.languageSelect.value = this.currentLanguage;
        this.updateLanguage();
    }
    
    generateSessionId() {
        let sessionId = sessionStorage.getItem('chatbot_session_id');
        if (!sessionId) {
            sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            sessionStorage.setItem('chatbot_session_id', sessionId);
        }
        return sessionId;
    }
    
    toggleWidget() {
        this.widget.classList.toggle('visible');
        if (this.widget.classList.contains('visible')) {
            this.chatInput.focus();
        }
    }
    
    sendMessage() {
        const message = this.chatInput.value.trim();
        if (!message) return;
        
        // Add user message to UI
        this.addMessage(message, 'user');
        this.chatInput.value = '';
        
        // Show typing indicator
        this.showTypingIndicator();
        
        // Send to server
        fetch('/api/chat/send', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                message: message,
                language: this.currentLanguage
            })
        })
        .then(response => response.json())
        .then(data => {
            this.removeTypingIndicator();
            if (data.success) {
                this.addMessage(data.message, 'bot');
            } else {
                this.addMessage('Sorry, I encountered an error. Please try again.', 'bot');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            this.removeTypingIndicator();
            this.addMessage('Connection error. Please try again.', 'bot');
        });
    }
    
    addMessage(message, sender) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender}-message`;
        
        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        contentDiv.textContent = message;
        
        messageDiv.appendChild(contentDiv);
        this.messagesContainer.appendChild(messageDiv);
        
        // Scroll to bottom
        this.messagesContainer.scrollTop = this.messagesContainer.scrollHeight;
    }
    
    showTypingIndicator() {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message bot-message typing';
        messageDiv.id = 'typing-indicator';
        
        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        contentDiv.innerHTML = '<div class="typing-indicator"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>';
        
        messageDiv.appendChild(contentDiv);
        this.messagesContainer.appendChild(messageDiv);
        
        this.messagesContainer.scrollTop = this.messagesContainer.scrollHeight;
    }
    
    removeTypingIndicator() {
        const indicator = document.getElementById('typing-indicator');
        if (indicator) {
            indicator.remove();
        }
    }
    
    updateLanguage() {
        // Update placeholder and other UI text
        const placeholders = {
            'en': 'Type your message...',
            'hi': 'अपना संदेश टाइप करें...',
            'or': 'ଆପଣଙ୍କ ବାର୍ତ୍ତା ଟାଇପ କରନ୍ତୁ...',
            'ta': 'உங்கள் செய்தியை டைப் செய்யவும்...',
            'te': 'మీ సందేశాన్ని టైప్ చేయండి...',
            'bn': 'আপনার বার্তা টাইপ করুন...',
            'mr': 'आपला संदेश टाइप करा...',
            'gu': 'તમારો સંદેશ ટાઇપ કરો...'
        };
        
        this.chatInput.placeholder = placeholders[this.currentLanguage] || 'Type your message...';
    }
}

// Initialize chatbot when DOM is ready
document.addEventListener('DOMContentLoaded', () => {
    new MultilingualChatbot();
});
</script>
